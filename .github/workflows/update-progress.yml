name: Update Profile Progress

on:
  push:
    paths:
      - "progress.json"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update README progress
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // 1. Read json
            const progressData = JSON.parse(fs.readFileSync('progress.json', 'utf8'));

            // 2. Read README
            const readmePath = path.join('profile', 'README.md');
            let readmeContent = fs.readFileSync(readmePath, 'utf8');

            // 3. Helper to generate Markdown table
            const projectMeta = {
              stack: "[**Nanoo Stack**](https://stack.nanoolabs.dev)",
              labs: "[**Nanoo Labs**](https://nanoolabs.dev)",
              cdn: "[**Nanoo CDN**](https://cdn.nanoolabs.dev)",
              docs: "[**Nanoo Docs**](https://docs.nanoolabs.dev)"
            };

            const tableRows = Object.keys(progressData).map(key => {
              const { percent, status } = progressData[key];
              const name = projectMeta[key] || key;
              return `| ${name} | \`${percent}%\` | \`${status}\` |`;
            }).join('\n');

            const replacement = `<!-- roadmap_table -->\n${tableRows}\n<!-- roadmap_table_end -->`;

            const regex = /<!-- roadmap_table -->.*?<!-- roadmap_table_end -->/s;
            readmeContent = readmeContent.replace(regex, replacement);
            // 5. Write back
            fs.writeFileSync(readmePath, readmeContent);

      - name: Commit and Push
        run: |
          git config --global user.name "nanoobot"
          git config --global user.email "bot@nanoolabs.dev"
          git add profile/README.md
          git diff --staged --quiet || git commit -m "chore: auto-update project progress nanoolabs"
          git push
