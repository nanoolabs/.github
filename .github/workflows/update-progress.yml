name: Update Profile Progress

on:
  push:
    branches:
      - main
    paths:
      - "progress.json"
      - ".github/workflows/update-progress.yml"
      - "profile/README.md"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update README progress
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // 1. Read json
            const progressData = JSON.parse(fs.readFileSync('progress.json', 'utf8'));

            // 2. Read README
            const readmePath = path.join('profile', 'README.md');
            let readmeContent = fs.readFileSync(readmePath, 'utf8');

            // 3. Helper to define status base on percentage
            const getStatus = (percent) => {
              if (percent >= 100) return "Stable";
              if (percent >= 76) return "Polishing";
              if (percent >= 51) return "Experimental";
              if (percent >= 31) return "Alpha";
              if (percent >= 11) return "Development";
              return "Planning";
            };

            // 4. Generate Entire Table
            const header = "| Project | Progress | Status |\n| :--- | :--- | :--- |";
            const tableRows = Object.keys(progressData).map(key => {
              const project = progressData[key];
              const autoStatus = getStatus(project.percent);
              const nameLink = `[**${project.name}**](${project.url})`;
              return `| ${nameLink} | \`${project.percent}%\` | \`${autoStatus}\` |`;
            }).join('\n');

            const fullTable = `${header}\n${tableRows}`;
            const replacement = `<!-- roadmap_table -->\n${fullTable}\n<!-- roadmap_table_end -->`;

            const regex = /<!-- roadmap_table -->.*?<!-- roadmap_table_end -->/s;
            readmeContent = readmeContent.replace(regex, replacement);
            // 5. Write back
            fs.writeFileSync(readmePath, readmeContent);

      - name: Commit and Push
        run: |
          git config --global user.name "nanoobot"
          git config --global user.email "bot@nanoolabs.dev"
          git add profile/README.md
          git diff --staged --quiet || git commit -m "chore: auto-update project progress nanoolabs"
          git push
